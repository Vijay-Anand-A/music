<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Fees | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Admission Fees</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Admission Fees</h3>
                        <button class="btn-primary" id="openPaymentModal">Record New Payment</button>
                    </div>
                    
                    <!-- Payment Modal -->
                    <div id="paymentModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h2>Record New Payment</h2>
                                <span class="close-modal">&times;</span>
                            </div>
                            <form id="paymentForm">
                                <div class="modal-body">
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="receiptNo">No.</label>
                                            <input type="text" id="receiptNo" name="receiptNo" value="213" readonly style="background: #f8f9fa;">
                                        </div>
                                        <div class="form-group">
                                            <label for="paymentDate">Date</label>
                                            <input type="date" id="paymentDate" name="paymentDate" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="studentName">Name</label>
                                        <input type="text" id="studentName" name="studentName" placeholder="Enter student name" required>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="phoneNo">Ph. No.</label>
                                            <input type="tel" id="phoneNo" name="phoneNo" placeholder="Enter phone number" required>
                                        </div>
                                        <div class="form-group">
                                            <label for="course">Course</label>
                                            <input type="text" id="course" name="course" placeholder="Enter course name" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Fee Type</label>
                                        <div style="display: flex; gap: 20px; margin-top: 5px;">
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="radio" name="feeType" value="admission" checked> Admission Fees
                                            </label>
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="radio" name="feeType" value="monthly"> Monthly Fees
                                            </label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="totalAmount">Total Amount</label>
                                        <input type="number" id="totalAmount" name="totalAmount" placeholder="Enter total amount" required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn-secondary" id="closePaymentModal">Cancel</button>
                                    <button type="submit" class="btn-primary">Save Payment</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Sarah Connor</td>
                                <td>$500.00</td>
                                <td>Cash</td>
                                <td>2024-01-15</td>
                                <td><span class="badge badge-paid">Paid</span></td>
                            </tr>
                            <tr>
                                <td>Mike Ross</td>
                                <td>$500.00</td>
                                <td>Online</td>
                                <td>2024-02-10</td>
                                <td><span class="badge badge-pending">Pending</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
</body>
</html>
