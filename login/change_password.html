<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <a href="current_students.html">
                        <li>
                            <i class="fas fa-user-graduate"></i>
                            <span>Current Student</span>
                        </li>
                    </a>
                    <a href="admission_fees.html">
                        <li>
                            <i class="fas fa-file-invoice-dollar"></i>
                            <span>Admission Fees</span>
                        </li>
                    </a>
                    <a href="monthly_fees.html">
                        <li>
                            <i class="fas fa-calendar-check"></i>
                            <span>Monthly Fees</span>
                        </li>
                    </a>
                    <a href="fees_report.html">
                        <li>
                            <i class="fas fa-chart-line"></i>
                            <span>Fees Report</span>
                        </li>
                    </a>
                    <div class="menu-divider"></div>
                    <a href="settings.html">
                        <li>
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </li>
                    </a>
                    <a href="change_password.html">
                        <li class="active">
                            <i class="fas fa-key"></i>
                            <span>Change Password</span>
                        </li>
                    </a>
                    <a href="#" class="logout-item">
                        <li>
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </li>
                    </a>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Change Password</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <h3 style="margin-bottom: 20px;">Security Management</h3>
                    <div style="max-width: 400px;">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" placeholder="Enter current password">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" placeholder="Confirm new password">
                        </div>
                        <button class="btn-primary" style="margin-top: 10px;">Update Security Password</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
</body>
</html>
