<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fees Report | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Revenue & Fees Report</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">TOTAL COLLECTION (MAY)</h4>
                        <h2 style="color: #2ecc71;">$1,500.00</h2>
                        <p style="font-size: 11px; color: #27ae60; margin-top: 5px;"><i class="fas fa-arrow-up"></i> 12% from last month</p>
                    </div>
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">TOTAL PENDING</h4>
                        <h2 style="color: #e74c3c;">$350.00</h2>
                        <p style="font-size: 11px; color: #c0392b; margin-top: 5px;"><i class="fas fa-exclamation-circle"></i> 5 Students pending</p>
                    </div>
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">NEW ADMISSIONS (YTD)</h4>
                        <h2 style="color: var(--primary-color);">45</h2>
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Since January 2024</p>
                    </div>
                </div>

                <div class="data-card">
                    <h3>Monthly Summary</h3>
                    <div style="height: 200px; display: flex; align-items: flex-end; gap: 20px; padding: 20px 0;">
                        <!-- Mock Bar Chart -->
                        <div style="flex: 1; background: var(--primary-color); height: 60%; border-radius: 4px 4px 0 0; position: relative;">
                            <span style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px;">Jan</span>
                        </div>
                        <div style="flex: 1; background: var(--primary-color); height: 80%; border-radius: 4px 4px 0 0; position: relative;">
                            <span style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px;">Feb</span>
                        </div>
                        <div style="flex: 1; background: var(--primary-color); height: 75%; border-radius: 4px 4px 0 0; position: relative;">
                            <span style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px;">Mar</span>
                        </div>
                        <div style="flex: 1; background: var(--primary-color); height: 90%; border-radius: 4px 4px 0 0; position: relative;">
                            <span style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px;">Apr</span>
                        </div>
                        <div style="flex: 1; background: var(--secondary-color); height: 95%; border-radius: 4px 4px 0 0; position: relative;">
                            <span style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 12px;">May</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
</body>
</html>
