<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fees Report | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Revenue & Fees Report</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">TOTAL STUDENTS</h4>
                        <h2 id="totalStudents" style="color: var(--primary-color);">0</h2>
                        <div style="display: flex; gap: 10px; margin-top: 5px; font-size: 11px;">
                            <span style="color: #2ecc71;">Active: <span id="activeStudents">0</span></span>
                            <span style="color: #e74c3c;">Deactive: <span id="deactiveStudents">0</span></span>
                        </div>
                    </div>
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">TOTAL COLLECTION</h4>
                        <h2 id="totalCollection" style="color: #2ecc71;">₹0.00</h2>
                    </div>
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">ADMISSION FEES</h4>
                        <h2 id="totalAdmissionFees" style="color: #3498db;">₹0.00</h2>
                    </div>
                    <div class="data-card">
                        <h4 style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;">MONTHLY FEES</h4>
                        <h2 id="totalMonthlyFees" style="color: #f1c40f;">₹0.00</h2>
                    </div>
                </div>

                <div class="data-card" style="margin-top: 30px;">
                    <h3>Course-wise Student Count</h3>
                    <div id="courseCounts" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px;">
                        <!-- Course counts will be loaded here -->
                        <p style="color: var(--text-muted);">Loading course statistics...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch Student Stats
        onSnapshot(collection(db, "students"), (snapshot) => {
            let total = snapshot.size;
            let active = 0;
            let deactive = 0;
            let courseMap = {};

            snapshot.forEach(doc => {
                const data = doc.data();
                const status = data.status || 'active';
                const course = data.course || 'Unassigned';

                if (status === 'deactive') {
                    deactive++;
                } else {
                    active++;
                }

                // Count by course (only for active students or all? 
                // Usually total per course is more useful, but we can filter by active if needed. 
                // Let's count all assigned to that course)
                if (course) {
                    courseMap[course] = (courseMap[course] || 0) + 1;
                }
            });

            document.getElementById('totalStudents').textContent = total;
            document.getElementById('activeStudents').textContent = active;
            document.getElementById('deactiveStudents').textContent = deactive;

            // Render Course Counts
            const courseContainer = document.getElementById('courseCounts');
            courseContainer.innerHTML = '';
            
            const sortedCourses = Object.keys(courseMap).sort();
            if (sortedCourses.length === 0) {
                courseContainer.innerHTML = '<p style="color: var(--text-muted);">No courses found.</p>';
            } else {
                sortedCourses.forEach(course => {
                    const count = courseMap[course];
                    const courseCard = `
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color);">
                            <h5 style="margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">${course}</h5>
                            <h3 style="margin: 5px 0 0; font-size: 20px; color: var(--primary-color);">${count} Students</h3>
                        </div>
                    `;
                    courseContainer.insertAdjacentHTML('beforeend', courseCard);
                });
            }
        });

        // Fetch Payment Stats
        const qPayments = query(collection(db, "payments"), orderBy("createdAt", "desc"));
        onSnapshot(qPayments, (snapshot) => {
            let totalColl = 0;
            let totalAdm = 0;
            let totalMonth = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                const adm = parseFloat(data.adm_fee || 0);
                const month = parseFloat(data.month_fee || 0);
                const total = adm + month;

                totalColl += total;
                totalAdm += adm;
                totalMonth += month;
            });

            document.getElementById('totalCollection').textContent = `₹${totalColl.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            document.getElementById('totalAdmissionFees').textContent = `₹${totalAdm.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            document.getElementById('totalMonthlyFees').textContent = `₹${totalMonth.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        });
    </script>
    <script src="dashboard-script.js"></script>
</body>
</html>
