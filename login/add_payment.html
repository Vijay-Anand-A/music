<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popupstyle.css">
</head>
<body>
   <div id="paymentModal" class="modal" style="display: block; position: static; width: 100%; height: 100%;">
                        <div class="modal-content" style="margin: 0 auto; width: 100%; max-width: none; box-shadow: none;">
                            <div class="modal-header">
                                <h2>New Payment</h2>
                                <span class="close-modal" onclick="window.parent.closePopup3()">&times;</span>
                            </div>
                            <form id="paymentForm">
                                <div class="modal-body">
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="receiptNo">No.</label>
                                            <input type="text" id="receiptNo" name="receiptNo" value="213" readonly style="background: #f8f9fa;">
                                        </div>
                                        <div class="form-group">
                                            <label for="paymentDate">Entry Date</label>
                                            <input type="date" id="paymentDate" name="paymentDate" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="studentName">Name</label>
                                        <input type="text" id="studentName" name="studentName" placeholder="Enter student name" list="studentNameList" required>
                                        <datalist id="studentNameList"></datalist>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="phoneNo">Ph. No.</label>
                                            <input type="tel" id="phoneNo" name="phoneNo" placeholder="Enter phone number" required>
                                        </div>
                                        <div class="form-group">
                                            <label for="course">Course</label>
                                            <select id="course" name="course" required>
                                                <option value="">Select Course</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Fee Type</label>
                                        <div style="display: flex; gap: 20px; margin-top: 5px; flex-wrap: wrap; align-items: center;">
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="checkbox" id="admissionFeeCheck" name="admission" value="admission" checked> Admission Fees
                                                <input type="number" id="admissionFeeAmount" style="width: 80px; padding: 5px; border: 1px solid #dfe6e9; border-radius: 4px; margin-left: 5px;" step="0.01">
                                            </label>
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="checkbox" id="monthlyFeeCheck" name="monthly" value="monthly"> Monthly Fees
                                                <input type="number" id="monthlyFeeAmount" style="width: 80px; padding: 5px; border: 1px solid #dfe6e9; border-radius: 4px; margin-left: 5px;" step="0.01">
                                            </label>
                                            <select id="month" name="month" required style="padding: 8px; border-radius: 6px; border: 1px solid #dfe6e9;">
                                                <option value="">Select Month</option>
                                                <option value="January">January</option>
                                                <option value="February">February</option>
                                                <option value="March">March</option>
                                                <option value="April">April</option>
                                                <option value="May">May</option>
                                                <option value="June">June</option>
                                                <option value="July">July</option>
                                                <option value="August">August</option>
                                                <option value="September">September</option>
                                                <option value="October">October</option>
                                                <option value="November">November</option>
                                                <option value="December">December</option>
                                            </select>
                                            <select id="year" name="year" required style="padding: 8px; border-radius: 6px; border: 1px solid #dfe6e9;">
                                                <option value="">Select Year</option>
                                                <script>
                                                    for (let i = 2023; i <= new Date().getFullYear(); i++) {
                                                        document.write(`<option value="${i}">${i}</option>`);
                                                    }
                                                </script>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="totalAmount">Total Amount</label>
                                        <input type="number" id="totalAmount" name="totalAmount" placeholder="Enter total amount" required>
                                    </div>

                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn-secondary" onclick="window.parent.closePopup3()">Cancel</button>
                                    <button type="submit" class="btn-primary">Save Payment</button>
                                </div>
                            </form>
                        </div>
                    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc, updateDoc, serverTimestamp, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            const courseSelect = document.getElementById('course');
            const studentNameInput = document.getElementById('studentName');
            const studentNameList = document.getElementById('studentNameList');
            const phoneNoInput = document.getElementById('phoneNo');
            const admissionFeeCheck = document.getElementById('admissionFeeCheck');
            const monthlyFeeCheck = document.getElementById('monthlyFeeCheck');
            const admissionFeeAmountInput = document.getElementById('admissionFeeAmount');
            const monthlyFeeAmountInput = document.getElementById('monthlyFeeAmount');
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const totalAmountInput = document.getElementById('totalAmount');
            const dateInput = document.getElementById('paymentDate');
            const receiptNoInput = document.getElementById('receiptNo');
            const paymentForm = document.getElementById('paymentForm');
            
            let studentsData = {}; // Store student details for auto-fill

            // Check for edit ID
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');

            if (editId) {
                document.querySelector('.modal-header h2').textContent = "Edit Payment";
                document.querySelector('button[type="submit"]').textContent = "Update Payment";
            }

            if (dateInput && !editId) {
                dateInput.valueAsDate = new Date();
            }

            // Fetch and populate students for suggestions
            async function populateStudents() {
                try {
                    const querySnapshot = await getDocs(collection(db, "students"));
                    studentNameList.innerHTML = '';
                    querySnapshot.forEach((doc) => {
                        const student = doc.data();
                        const option = document.createElement('option');
                        option.value = student.nm;
                        studentNameList.appendChild(option);
                        
                        // Store student details by name for lookup
                        studentsData[student.nm] = {
                            mob: student.mob,
                            course: student.course
                        };
                    });
                } catch (error) {
                    console.error("Error fetching students: ", error);
                }
            }

            // Auto-fill phone and course when student is selected
            studentNameInput.addEventListener('input', (e) => {
                const name = e.target.value;
                if (studentsData[name]) {
                    phoneNoInput.value = studentsData[name].mob;
                    
                    // Select the matching course in the dropdown
                    const courseName = studentsData[name].course;
                    for (let i = 0; i < courseSelect.options.length; i++) {
                        if (courseSelect.options[i].textContent === courseName) {
                            courseSelect.selectedIndex = i;
                            onCourseChange(); // Populate fees when course changes
                            break;
                        }
                    }
                }
            });

            async function getNextBillNo() {
                if (editId) return null; // Don't fetch next bill no if editing
                try {
                    const q = query(collection(db, "payments"), orderBy("billno", "desc"), limit(1));
                    const querySnapshot = await getDocs(q);
                    let nextBillNo = 200; // Default starting number
                    
                    if (!querySnapshot.empty) {
                        const lastBill = querySnapshot.docs[0].data();
                        if (lastBill.billno) {
                            nextBillNo = Number(lastBill.billno) + 1;
                        }
                    }
                    if (receiptNoInput) {
                        receiptNoInput.value = nextBillNo;
                    }
                    return nextBillNo;
                } catch (error) {
                    console.error("Error getting next bill number: ", error);
                    return 200; // Fallback
                }
            }

            function onCourseChange() {
                const selectedOption = courseSelect.options[courseSelect.selectedIndex];
                if (selectedOption && selectedOption.value !== "") {
                    const admissionFee = Number(selectedOption.getAttribute('data-admission')) || 0;
                    const monthlyFee = Number(selectedOption.getAttribute('data-monthly')) || 0;
                    
                    admissionFeeAmountInput.value = admissionFee.toFixed(2);
                    monthlyFeeAmountInput.value = monthlyFee.toFixed(2);
                }
                updateTotalAmount();
            }

            function updateTotalAmount() {
                let total = 0;
                
                const admFee = Number(admissionFeeAmountInput.value) || 0;
                const monFee = Number(monthlyFeeAmountInput.value) || 0;
                
                if (admissionFeeCheck.checked) {
                    total += admFee;
                }
                if (monthlyFeeCheck.checked) {
                    total += monFee;
                }
                
                totalAmountInput.value = total;
            }

            // Event Listeners
            courseSelect.addEventListener('change', onCourseChange);
            admissionFeeCheck.addEventListener('change', updateTotalAmount);
            monthlyFeeCheck.addEventListener('change', updateTotalAmount);
            admissionFeeAmountInput.addEventListener('input', updateTotalAmount);
            monthlyFeeAmountInput.addEventListener('input', updateTotalAmount);

            async function populateCourses() {
                console.log("Attempting to fetch courses...");
                try {
                    const querySnapshot = await getDocs(collection(db, "course"));
                    console.log("Fetched " + querySnapshot.size + " courses");
                    if (courseSelect) {
                        querySnapshot.forEach((doc) => {
                            const course = doc.data();
                            console.log("Adding course: ", course.courseName);
                            const option = document.createElement('option');
                            option.value = doc.id;
                            option.textContent = course.courseName;
                            // Store fees in data attributes
                            option.setAttribute('data-admission', course.admissionFee || 0);
                            option.setAttribute('data-monthly', course.monthlyFee || 0);
                            courseSelect.appendChild(option);
                        });
                    }
                    
                    // If editing, load data after courses are populated
                    if (editId) {
                        loadEditData();
                    } else {
                        getNextBillNo();
                    }
                } catch (error) {
                    console.error("Error fetching courses: ", error);
                }
            }

            async function loadEditData() {
                try {
                    const docRef = doc(db, "payments", editId);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        receiptNoInput.value = data.billno || '';
                        dateInput.value = data.entry_date || '';
                        studentNameInput.value = data.nm || '';
                        phoneNoInput.value = data.mob || '';
                        
                        // Set course
                        for (let i = 0; i < courseSelect.options.length; i++) {
                            if (courseSelect.options[i].textContent === data.course) {
                                courseSelect.selectedIndex = i;
                                break;
                            }
                        }
                        
                        // Set fee values from DB
                        admissionFeeAmountInput.value = (data.adm_fee || 0).toFixed(2);
                        monthlyFeeAmountInput.value = (data.month_fee || 0).toFixed(2);
                        
                        // Set fee types
                        const feetypes = data.feetype ? data.feetype.split(',') : [];
                        admissionFeeCheck.checked = feetypes.includes('adm');
                        monthlyFeeCheck.checked = feetypes.includes('month');
                        
                        monthSelect.value = data.mnth || '';
                        yearSelect.value = data.yr || '';
                        
                        updateTotalAmount();
                    }
                } catch (error) {
                    console.error("Error loading edit data:", error);
                }
            }

            populateStudents();
            populateCourses();

            // Handle form submission
            paymentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const studentName = document.getElementById('studentName').value;
                const phoneNo = document.getElementById('phoneNo').value;
                const totalAmountVal = document.getElementById('totalAmount').value;
                const selectedCourseOption = courseSelect.options[courseSelect.selectedIndex];
                const courseName = selectedCourseOption ? selectedCourseOption.textContent : "";
                const entryDate = document.getElementById('paymentDate').value;
                const selectedMonth = document.getElementById('month').value;
                const selectedYear = document.getElementById('year').value;
                const yr = selectedYear ? Number(selectedYear) : (entryDate ? new Date(entryDate).getFullYear() : new Date().getFullYear());
                
                const adm_fee = admissionFeeCheck.checked ? (Number(admissionFeeAmountInput.value) || 0) : 0;
                const month_fee = monthlyFeeCheck.checked ? (Number(monthlyFeeAmountInput.value) || 0) : 0;
                
                let feetypeArr = [];
                if (admissionFeeCheck.checked) feetypeArr.push("adm");
                if (monthlyFeeCheck.checked) feetypeArr.push("month");
                const feetype = feetypeArr.join(",");

                try {
                    // Check if student exists in current student list
                    const studentsRef = collection(db, "students");
                    const qStudent = query(studentsRef, where("nm", "==", studentName));
                    const studentSnapshot = await getDocs(qStudent);
                    
                    if (studentSnapshot.empty) {
                        // If student doesn't exist, create a new student record
                        const newStudentRef = doc(collection(db, "students"));
                        const studentData = {
                            id: newStudentRef.id,
                            nm: studentName,
                            mob: phoneNo,
                            course: courseName,
                            status: "active",
                            createdAt: serverTimestamp()
                        };
                        await setDoc(newStudentRef, studentData);
                        console.log("New student added: ", studentName);
                    }

                    let billNo;
                    let paymentRef;
                    
                    if (editId) {
                        billNo = Number(receiptNoInput.value);
                        paymentRef = doc(db, "payments", editId);
                    } else {
                        billNo = await getNextBillNo();
                        paymentRef = doc(collection(db, "payments"));
                    }

                    const paymentData = {
                        id: paymentRef.id,
                        nm: studentName,
                        mob: phoneNo,
                        course: courseName,
                        entry_date: entryDate,
                        mnth: selectedMonth,
                        yr: yr,
                        adm_fee: adm_fee,
                        month_fee: month_fee,
                        feetype: feetype,
                        status: "paid",
                        tot_amt: Number(totalAmountVal),
                        billno: billNo,
                        bill_date: entryDate,
                        updatedAt: serverTimestamp()
                    };

                    if (!editId) {
                        paymentData.createdAt = serverTimestamp();
                    }

                    await setDoc(paymentRef, paymentData, { merge: true });
                    
                    alert(editId ? 'Payment updated successfully!' : 'Payment saved successfully!');
                    paymentForm.reset();
                    if (window.parent && window.parent.closePopup3) {
                        window.parent.closePopup3();
                    }
                } catch (error) {
                    console.error("Error saving payment: ", error);
                    alert('Error saving payment. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
