   <head>
    <link rel="stylesheet" href="popupstyle.css">
    </head>
   <div id="paymentModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h2>New Payment</h2>
                                <span class="close-modal">&times;</span>
                            </div>
                            <form id="paymentForm">
                                <div class="modal-body">
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="receiptNo">No.</label>
                                            <input type="text" id="receiptNo" name="receiptNo" value="213" readonly style="background: #f8f9fa;">
                                        </div>
                                        <div class="form-group">
                                            <label for="paymentDate">Date</label>
                                            <input type="date" id="paymentDate" name="paymentDate" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="studentName">Name</label>
                                        <input type="text" id="studentName" name="studentName" placeholder="Enter student name" required>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                        <div class="form-group">
                                            <label for="phoneNo">Ph. No.</label>
                                            <input type="tel" id="phoneNo" name="phoneNo" placeholder="Enter phone number" required>
                                        </div>
                                        <div class="form-group">
                                            <label for="course">Course</label>
                                            <input type="text" id="course" name="course" placeholder="Enter course name" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Fee Type</label>
                                        <div style="display: flex; gap: 20px; margin-top: 5px;">
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="radio" name="feeType" value="admission" checked> Admission Fees
                                            </label>
                                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 400;">
                                                <input type="radio" name="feeType" value="monthly"> Monthly Fees
                                            </label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="totalAmount">Total Amount</label>
                                        <input type="number" id="totalAmount" name="totalAmount" placeholder="Enter total amount" required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn-secondary" id="closePaymentModal">Cancel</button>
                                    <button type="submit" class="btn-primary">Save Payment</button>
                                </div>
                            </form>
                        </div>
                    </div>
