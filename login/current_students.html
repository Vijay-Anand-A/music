<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Students | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
                <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Current Students</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Active Student List</h3>
                        <button class="btn-primary" onclick="addStudent()">Add New Student</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Course</th>
                                <th>Action</th>
                                <th>Application</th>
                            </tr>
                        </thead>
                        <tbody id="studentList">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
           const q = query(collection(db, "students"), orderBy("createdAt", "desc"));
                    onSnapshot(q, (snapshot) => {
                        const studentList = document.getElementById("studentList");
                        studentList.innerHTML = "";
                        let count = 1;
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            const row = document.createElement("tr");
                            row.innerHTML = `
                                <td>${count++}</td>
                                <td>${data.nm}</td>
                                <td>${data.mob}</td>
                                <td>${data.course}</td>
                                <td><i class="fas fa-trash" onclick="deleteStudent('${doc.id}')" style="color:red;cursor:pointer;"></i></td>
                                <td><i class="fas fa-plus" onclick="editStudent('${doc.id}')" style="cursor:pointer;color:#6a11cb;" title="Add Detail"></i> &nbsp; 
                                    <i class="fas fa-print" onclick="printApplication('${doc.id}')" style="cursor:pointer;color:#006400;" title="Print Application"></i></td>
                            `;
                            studentList.appendChild(row);
                        });
                    });

               window.printApplication = (studentId) => {
                   window.open(`student_application.html?id=${studentId}`, '_blank');
               };

               window.deleteStudent = async (studentId) => {
            // Confirm deletion
            if (!confirm("Are you sure you want to delete this student?")) {
                return;
            }

            try {
                await deleteDoc(doc(db, "students", studentId));
               
            } catch (error) {
                console.error("Error deleting student:", error);
                alert("Failed to delete student");
            }
        };
          
</script>
    

	<div id="overlay3" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); backdrop-filter: blur(3px);z-index:999;">
	</div>

	<!-- Popup -->
	<div id="popup3" style="display:none; position:fixed; top:20%; left:20%; width:60%; height:70%;background:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.5);z-index:1000;  animation: fadeIn 0.3s ease-in-out;">
		<iframe id="popupFrame3" src="" style="width:100%; height:100%; border:none;"></iframe>
	</div>
	<script>
		function addStudent() {
			document.getElementById("overlay3").style.display = "block";
			document.getElementById("popup3").style.display = "block";
			document.getElementById("popupFrame3").src = "add_student.html";    
		}

		function editStudent(id) {
			document.getElementById("overlay3").style.display = "block";
			document.getElementById("popup3").style.display = "block";
			document.getElementById("popupFrame3").src = "add_student.html?id=" + id;    
		}

		function closePopup3() {
			document.getElementById("overlay3").style.display = "none";
			document.getElementById("popup3").style.display = "none";
			document.getElementById("popupFrame3").src = "";
		}
		// overlay click -> close
		document.getElementById("overlay3").onclick = closePopup3;
	</script>
	<!--===================================================================================================================================================-->
    <script src="dashboard-script.js"></script>
</body>
</html>
