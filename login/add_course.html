<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar').innerHTML = data;
            });
    </script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Add New Course</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div style="display: flex; gap: 20px; align-items: flex-start;">
                    <!-- Left: Form -->
                    <div class="data-card" style="flex: 1; min-width: 350px;">
                        <h3 style="margin-bottom: 20px;">Course Details</h3>
                        <form id="addCourseForm">
                            <input type="hidden" id="editingCourseId">
                            <div class="form-group">
                                <label for="courseName">Course Name</label>
                                <input type="text" id="courseName" name="courseName" placeholder="e.g., Violin, Piano, Guitar" required>
                            </div>
                            <div class="form-group">
                                <label for="admissionFee">Admission Fee (Rs)</label>
                                <input type="number" id="admissionFee" name="admissionFee" placeholder="Enter one-time admission fee" required>
                            </div>
                            <div class="form-group">
                                <label for="monthlyFee">Monthly Fee (Rs)</label>
                                <input type="number" id="monthlyFee" name="monthlyFee" placeholder="Enter recurring monthly fee" required>
                            </div>
                            <button type="submit" id="submitBtn" class="btn-primary" style="margin-top: 10px; width: 100%;">Add Course</button>
                            <button type="button" id="cancelEditBtn" class="btn-secondary" style="margin-top: 10px; width: 100%; display: none;">Cancel Edit</button>
                        </form>
                    </div>

                    <!-- Right: List -->
                    <div class="data-card" style="flex: 2; overflow-x: auto;">
                        <h3 style="margin-bottom: 20px;">Course List</h3>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Sl.No</th>
                                    <th>Course</th>
                                    <th>Admission Fee</th>
                                    <th>Monthly Fee</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="courseTableBody">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch and display courses
         const courseTableBody = document.getElementById('courseTableBody');
         const addCourseForm = document.getElementById('addCourseForm');
         const submitBtn = document.getElementById('submitBtn');
         const cancelEditBtn = document.getElementById('cancelEditBtn');
         const editingCourseIdInput = document.getElementById('editingCourseId');

         onSnapshot(collection(db, "course"), (snapshot) => {
             courseTableBody.innerHTML = '';
             let slNo = 1;
             snapshot.forEach((doc) => {
                 const data = doc.data();
                 const row = `
                     <tr>
                         <td>${slNo++}</td>
                         <td>${data.courseName}</td>
                         <td>${data.admissionFee}</td>
                         <td>${data.monthlyFee}</td>
                         <td>
                             <button onclick="editCourse('${doc.id}', '${data.courseName}', ${data.admissionFee}, ${data.monthlyFee})" style="background: none; border: none; color: #2575fc; cursor: pointer; margin-right: 10px;">
                                 <i class="fas fa-edit"></i>
                             </button>
                             <button onclick="deleteCourse('${doc.id}')" style="background: none; border: none; color: #d63031; cursor: pointer;">
                                 <i class="fas fa-trash"></i>
                             </button>
                         </td>
                     </tr>
                 `;
                 courseTableBody.innerHTML += row;
             });
         });

         // Make editCourse available globally
         window.editCourse = (id, name, admissionFee, monthlyFee) => {
             editingCourseIdInput.value = id;
             document.getElementById('courseName').value = name;
             document.getElementById('admissionFee').value = admissionFee;
             document.getElementById('monthlyFee').value = monthlyFee;
             submitBtn.textContent = 'Update Course';
             cancelEditBtn.style.display = 'block';
         };

         // Cancel edit
         cancelEditBtn.addEventListener('click', () => {
             addCourseForm.reset();
             editingCourseIdInput.value = '';
             submitBtn.textContent = 'Add Course';
             cancelEditBtn.style.display = 'none';
         });

         // Make deleteCourse available globally
         window.deleteCourse = async (courseId) => {
             if (confirm('Are you sure you want to delete this course?')) {
                 try {
                     await deleteDoc(doc(db, "course", courseId));
                     alert('Course deleted successfully!');
                 } catch (error) {
                     console.error("Error deleting document: ", error);
                     alert('Error deleting course.');
                 }
             }
         };

         addCourseForm.addEventListener('submit', async (e) => {
             e.preventDefault();

             const courseId = editingCourseIdInput.value;
             const courseName = document.getElementById('courseName').value;
             const admissionFee = document.getElementById('admissionFee').value;
             const monthlyFee = document.getElementById('monthlyFee').value;

             try {
                 if (courseId) {
                     // Update existing course
                     await setDoc(doc(db, "course", courseId), {
                         courseId: courseId,
                         courseName: courseName,
                         admissionFee: Number(admissionFee),
                         monthlyFee: Number(monthlyFee)
                     });
                     alert('Course updated successfully!');
                 } else {
                     // Add new course
                     const newCourseRef = doc(collection(db, "course"));
                     await setDoc(newCourseRef, {
                         courseId: newCourseRef.id,
                         courseName: courseName,
                         admissionFee: Number(admissionFee),
                         monthlyFee: Number(monthlyFee)
                     });
                     alert('Course added successfully!');
                 }
                 addCourseForm.reset();
                 editingCourseIdInput.value = '';
                 submitBtn.textContent = 'Add Course';
                 cancelEditBtn.style.display = 'none';
             } catch (error) {
                 console.error("Error saving document: ", error);
                 alert('Error saving course. Please try again.');
             }
         });
    </script>
</body>
</html>
