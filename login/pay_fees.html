<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')

</script>
    <div class="dashboard-container">
        <!-- Sidebar -->

                <i class="fas fa-music"></i>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Pay Fees</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Payments</h3>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <select id="month" style="padding: 8px; border-radius: 6px; border: 1px solid #dfe6e9;">
                                <option value="all">All-month</option>
                                <option value="January">January</option>
                                <option value="February">February</option>

                                <option value="May">May</option>
                                <option value="June">June</option>
                                <option value="July">July</option>
                                <option value="August">August</option>
                                <option value="September">September</option>
                                <option value="October">October</option>
                                <option value="November">November</option>
                                <option value="December">December</option>
                            </select>
                            <select id="year" style="padding: 8px; border-radius: 6px; border: 1px solid #dfe6e9;">
                                <option value="all">All-Year</option>
                                <script> 
                                for (let i = 2023; i <= new Date().getFullYear(); i++) {
                                     document.write(` <option value="${i}">${i}</option>`);
                                }    
                                </script>
                            </select>

                        </div>
                    </div>
                    

                    	<!--=============================================================popup======FOR Present Absent===========================================================-->
	<div id="overlay3" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); backdrop-filter: blur(3px);z-index:999;">
	</div>

	<!-- Popup -->
	<div id="popup3" style="display:none; position:fixed; top:20%; left:20%; width:60%; height:70%;background:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.5);z-index:1000;  animation: fadeIn 0.3s ease-in-out;">
		<iframe id="popupFrame3" src="" style="width:100%; height:100%; border:none;"></iframe>
	</div>
	<script>
		function addnewpayment() {
			document.getElementById("overlay3").style.display = "block";
			document.getElementById("popup3").style.display = "block";
			document.getElementById("popupFrame3").src = "add_payment.html";
		}

		function closePopup3() {
			document.getElementById("overlay3").style.display = "none";
			document.getElementById("popup3").style.display = "none";
			document.getElementById("popupFrame3").src = "";
		}
		// overlay click -> close
		document.getElementById("overlay3").onclick = closePopup3;
	</script>
	<!--===================================================================================================================================================-->


                    <!-- Payment Modal -->
                 

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Serial No</th>
                                <th>Student Name</th>
                                <th>Contact</th>
                                <th>Fee Type</th>
                                <th>Admission Fee</th>
                                <th>Monthly Fee</th>
                                <th>Total Amount</th>
                                <th>Month-Year</th>
                                
                                <th>Action</th>
                               
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const paymentsTableBody = document.getElementById('paymentsTableBody');
        const monthFilter = document.getElementById('month');
        const yearFilter = document.getElementById('year');

        let unsubscribe = null;

        function loadPayments() {
            if (unsubscribe) {
                unsubscribe();
            }

            const selectedMonth = monthFilter.value;
            const selectedYear = yearFilter.value;

            // Fetch all payments ordered by date, then filter client-side
            const q = query(collection(db, "payments"), orderBy("createdAt", "desc"));

            unsubscribe = onSnapshot(q, (snapshot) => {
                paymentsTableBody.innerHTML = '';
                let slNo = 1;
                let totalAdm = 0;
                let totalMonth = 0;
                let totalAmt = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Client-side Filtering
                    const monthMatch = (selectedMonth === "all") || (data.mnth === selectedMonth);
                    const yearMatch = (selectedYear === "all") || (data.yr === Number(selectedYear));

                    if (monthMatch && yearMatch) {
                        let displayFeetype = "";
                        if (data.feetype) {
                            const types = data.feetype.split(",");
                            displayFeetype = types.map(t => t === "adm" ? "Admission Fee" : "Monthly Fee").join(" & ");
                        }
                        totalAdm += Number(data.adm_fee || 0);
                        totalMonth += Number(data.month_fee || 0);
                        totalAmt += Number(data.tot_amt || 0);
                        const row = `
                            <tr>
                                <td>${slNo++}</td>
                                <td>${data.nm || ""}</td>
                                <td>${data.mob || ""}</td>
                                <td>${displayFeetype}</td>
                                <td>Rs.${(data.adm_fee || 0).toFixed(2)}</td>
                                <td>Rs.${(data.month_fee || 0).toFixed(2)}</td>
                                <td>Rs.${(data.tot_amt || 0).toFixed(2)}</td>
                                <td>${data.yr || ""}-${data.mnth || ""}</td>
                            
                                <td>
                                    <i class="fas fa-receipt" style="cursor: pointer;color: #007bff;" onclick="viewReceipt('${doc.id}')" title="View Receipt"></i> 
                                    <i class="fas fa-edit" style="cursor: pointer;color: #28a745;" title="Edit Payment"></i> 
                                    <i class="fas fa-trash" style="cursor: pointer;color: #dc3545;" onclick="deletePayment('${doc.id}')" title="Delete Payment"></i></td>
                            </tr>
                           
                        `;
                        paymentsTableBody.innerHTML += row;
                    }
                });
                paymentsTableBody.innerHTML += `
                    <tr style="font-weight: bold;background-color: #f2f2f2;"><td colspan="4"><b>Total</b></td><td>Rs.${totalAdm.toFixed(2)}</td><td>Rs.${totalMonth.toFixed(2)}</td><td>Rs.${totalAmt.toFixed(2)}</td><td colspan="3"></td></tr>
                `;
            });
        }

        // Event Listeners for filters
        monthFilter.addEventListener('change', loadPayments);
        yearFilter.addEventListener('change', loadPayments);

        // Initial load
        loadPayments();

        // Make closePopup3 available if needed for children
        window.closePopup3 = () => {
            document.getElementById("overlay3").style.display = "none";
            document.getElementById("popup3").style.display = "none";
            document.getElementById("popupFrame3").src = "";
            // Reload payments after closing popup to show new data
            loadPayments();
        };
        
        // View Receipt Function
        window.viewReceipt = (paymentId) => {
            window.open(`receipt.html?id=${paymentId}`, '_blank');
        };

        // Delete Payment Function
        window.deletePayment = async (paymentId) => {
            // Confirm deletion
            if (!confirm("Are you sure you want to delete this payment?")) {
                return;
            }

            try {
                await deleteDoc(doc(db, "payments", paymentId));
                alert("Payment deleted successfully");
            } catch (error) {
                console.error("Error deleting payment:", error);
                alert("Failed to delete payment");
            }
        };
    </script>
</body>
</html>
