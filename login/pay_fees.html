<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Fees | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Pay Fees</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Payments</h3>
                        <button class="btn-primary" id="openPaymentModal"  onclick="addnewpayment()">Add New Payment</button>
                    </div>
                    

                    	<!--=============================================================popup======FOR Present Absent===========================================================-->
	<div id="overlay3" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); backdrop-filter: blur(3px);z-index:999;">
	</div>

	<!-- Popup -->
	<div id="popup3" style="display:none; position:fixed; top:20%; left:20%; width:60%; height:70%;background:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.5);z-index:1000;  animation: fadeIn 0.3s ease-in-out;">
		<iframe id="popupFrame3" src="" style="width:100%; height:100%; border:none;"></iframe>
	</div>
	<script>
		function presentabsent() {
			document.getElementById("overlay3").style.display = "block";
			document.getElementById("popup3").style.display = "block";
			document.getElementById("popupFrame3").src = "add_payment.html";
		}

		function closePopup3() {
			document.getElementById("overlay3").style.display = "none";
			document.getElementById("popup3").style.display = "none";
			document.getElementById("popupFrame3").src = "";
		}
		// overlay click -> close
		document.getElementById("overlay3").onclick = closePopup3;
	</script>
	<!--===================================================================================================================================================-->


                    <!-- Payment Modal -->
                 

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Sarah Connor</td>
                                <td>$500.00</td>
                                <td>Cash</td>
                                <td>2024-01-15</td>
                                <td><span class="badge badge-paid">Paid</span></td>
                            </tr>
                            <tr>
                                <td>Mike Ross</td>
                                <td>$500.00</td>
                                <td>Online</td>
                                <td>2024-02-10</td>
                                <td><span class="badge badge-pending">Pending</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
</body>
</html>
