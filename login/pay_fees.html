<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Fees | AV Music School</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
fetch('/login/header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('sidebar').innerHTML = data;
    });
</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-music"></i>
                <span>AV Music</span>
            </div>
            <div id="sidebar"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Pay Fees</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6a11cb&color=fff" alt="Profile">
                </div>
            </header>
            
            <section class="content-area">
                <div class="data-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Payments</h3>
                        <button class="btn-primary" id="openPaymentModal"  onclick="addnewpayment()">Add New Payment</button>
                    </div>
                    

                    	<!--=============================================================popup======FOR Present Absent===========================================================-->
	<div id="overlay3" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); backdrop-filter: blur(3px);z-index:999;">
	</div>

	<!-- Popup -->
	<div id="popup3" style="display:none; position:fixed; top:20%; left:20%; width:60%; height:70%;background:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.5);z-index:1000;  animation: fadeIn 0.3s ease-in-out;">
		<iframe id="popupFrame3" src="" style="width:100%; height:100%; border:none;"></iframe>
	</div>
	<script>
		function addnewpayment() {
			document.getElementById("overlay3").style.display = "block";
			document.getElementById("popup3").style.display = "block";
			document.getElementById("popupFrame3").src = "add_payment.html";
		}

		function closePopup3() {
			document.getElementById("overlay3").style.display = "none";
			document.getElementById("popup3").style.display = "none";
			document.getElementById("popupFrame3").src = "";
		}
		// overlay click -> close
		document.getElementById("overlay3").onclick = closePopup3;
	</script>
	<!--===================================================================================================================================================-->


                    <!-- Payment Modal -->
                 

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Serial No</th>
                                <th>Student Name</th>
                                <th>Fee Type</th>
                                <th>Admission Fee</th>
                                <th>Monthly Fee</th>
                                <th>Total Amount</th>
                                <th>Month-Year</th>
                                <th>Status</th>
                                <th>Action</th>
                               
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHup4M5P3z-fy9fVRElBx0hutREWZGSAM",
            authDomain: "anandhavruksham-3aa36.firebaseapp.com",
            projectId: "anandhavruksham-3aa36",
            storageBucket: "anandhavruksham-3aa36.firebasestorage.app",
            messagingSenderId: "604117717957",
            appId: "1:604117717957:web:3df03ca1c702dba99331ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const paymentsTableBody = document.getElementById('paymentsTableBody');

        // Fetch and display payments in real-time
        const paymentsQuery = query(collection(db, "payments"), orderBy("createdAt", "desc"));
        onSnapshot(paymentsQuery, (snapshot) => {
            paymentsTableBody.innerHTML = '';
            let slNo = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Format feetype for display
                let displayFeetype = "";
                if (data.feetype) {
                    const types = data.feetype.split(",");
                    displayFeetype = types.map(t => t === "adm" ? "Admission Fee" : "Monthly Fee").join(" & ");
                }

                const row = `
                    <tr>
                        <td>${slNo++}</td>
                        <td>${data.nm || ""}</td>
                        <td>${displayFeetype}</td>
                        <td>Rs.${(data.adm_fee || 0).toFixed(2)}</td>
                        <td>Rs.${(data.month_fee || 0).toFixed(2)}</td>
                        <td>Rs.${(data.tot_amt || 0).toFixed(2)}</td>
                        <td>${data.yr || ""}-${data.mnth || ""}</td>
                        <td><span class="badge badge-paid">${data.status || "Paid"}</span></td>
                        <td><button class="btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="alert('Viewing payment ID: ${doc.id}')">View</button></td>
                    </tr>
                `;
                paymentsTableBody.innerHTML += row;
            });
        });

        // Make closePopup3 available if needed for children
        window.closePopup3 = () => {
            document.getElementById("overlay3").style.display = "none";
            document.getElementById("popup3").style.display = "none";
            document.getElementById("popupFrame3").src = "";
        };
    </script>
</body>
</html>
